<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Samsung S Pen & Sunset — ATU-1 | Oroboros Labs</title>
    <meta name="description" content="Samsung S Pen with sunset wallpaper showcase.">
    <link rel="icon" type="image/svg+xml" href="assets/img/oroboros-logo.svg">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
    <style>
        .showcase-page {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
        }
        .showcase-image {
            max-width: 100%;
            height: auto;
            border-radius: 20px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
            animation: fadeIn 1s ease;
        }
        .showcase-title {
            color: white;
            font-size: clamp(2rem, 5vw, 3rem);
            font-weight: 700;
            margin-bottom: 1rem;
            text-align: center;
        }
        .showcase-subtitle {
            color: rgba(255, 255, 255, 0.7);
            font-size: 1.25rem;
            margin-bottom: 2rem;
            text-align: center;
        }
        .back-link {
            margin-top: 2rem;
            color: #1428a0;
            text-decoration: none;
            font-weight: 600;
            padding: 0.75rem 1.5rem;
            background: white;
            border-radius: 8px;
            transition: all 0.3s ease;
        }
        .back-link:hover {
            background: #f0f0f0;
            transform: translateY(-2px);
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body>
    <div class="showcase-page">
        <h1 class="showcase-title">Samsung S Pen & Sunset</h1>
        <p class="showcase-subtitle">Precision meets beauty — the perfect companion for ATU-1</p>
        <img src="assets/img/samsung-spen-sunset.png" alt="Samsung S Pen with sunset wallpaper" class="showcase-image">
        <a href="index.html" class="back-link">← Back to ATU-1</a>
    </div>
</body>
</html>
